
name: CI/CD MLOps Pipeline for Engine Predictive Maintenance

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      # Set Hugging Face username as an environment variable for all steps in this job
      # IMPORTANT: Replace 'rakesh1248' with your actual Hugging Face username
      HF_USERNAME: rakesh1248

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn joblib huggingface_hub datasets

    - name: Create necessary directories for local storage and scripts
      run: |
        mkdir -p engine_predictive_maintenance/data
        mkdir -p engine_predictive_maintenance/model
        mkdir -p engine_predictive_maintenance # For Dockerfile, app.py, requirements.txt
        mkdir -p scripts # To store our pipeline Python scripts

    - name: 1) Run Data Registration Script
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }} # Pass HF_TOKEN as a secret
      run: python scripts/data_registration.py

    - name: 2) Run Data Preparation Script
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }} # Pass HF_TOKEN as a secret
      run: python scripts/data_preparation.py

    - name: 3) Run Model Building Script
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }} # Pass HF_TOKEN as a secret
      run: python scripts/model_building.py

    - name: 4) Run Model Deployment Script
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }} # Pass HF_TOKEN as a secret
      run: python scripts/model_deployment.py
